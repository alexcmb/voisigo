# Configuration Nginx pour HTTP (phase 1 : validation ACME Let's Encrypt)
# Ce fichier est utilisé AVANT d'avoir le certificat SSL
server {
    listen 80;
    server_name _;

    # Dossier de validation Let's Encrypt (challenge ACME)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste vers le frontend React
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
